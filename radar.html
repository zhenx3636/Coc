<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟雨楼 & 星辰璀璨 | 实时战争雷达</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: sans-serif; }
        .radar-scan { background: radial-gradient(circle, rgba(6,182,212,0.15) 0%, rgba(2,6,23,1) 70%); }
    </style>
</head>
<body class="selection:bg-cyan-500/30 min-h-screen p-4 md:p-8 radar-scan">
    <div class="max-w-5xl mx-auto space-y-6">
        
        <div class="flex flex-col md:flex-row justify-between items-center bg-slate-900 border border-slate-700 p-4 rounded-xl shadow-2xl gap-4">
            <h1 class="text-2xl font-black tracking-wider flex items-center gap-3">
                <i class="fa-solid fa-satellite-dish text-cyan-400 animate-pulse"></i> 战争实况雷达
            </h1>
            <div class="flex gap-2 bg-slate-800 p-1.5 rounded-lg border border-slate-700">
                <button onclick="loadWarData('hq')" id="btn-hq" class="px-6 py-2 rounded font-bold transition-colors bg-amber-600 text-white shadow-lg">烟雨楼 (总部)</button>
                <button onclick="loadWarData('br')" id="btn-br" class="px-6 py-2 rounded font-bold transition-colors text-slate-400 hover:text-white">星辰璀璨 (分部)</button>
            </div>
        </div>

        <div id="loading-box" class="text-center py-20 text-cyan-400 font-bold"><i class="fa-solid fa-spinner animate-spin text-3xl mb-3"></i><p>正在同步 Supercell 官方卫星数据...</p></div>
        
        <div id="error-box" class="hidden text-center py-20 text-red-500 font-bold"><i class="fa-solid fa-triangle-exclamation text-4xl mb-3"></i><p id="error-msg">未在战争中或日志未公开</p></div>

        <div id="war-dashboard" class="hidden space-y-6">
            <div class="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-2xl relative overflow-hidden">
                <div class="absolute inset-0 opacity-10 flex justify-center items-center font-black text-9xl italic">VS</div>
                <div class="text-center mb-4 text-cyan-400 font-bold text-sm tracking-widest" id="war-status-time"></div>
                <div class="flex justify-between items-center relative z-10">
                    <div class="w-[40%] text-left">
                        <h2 id="my-clan-name" class="text-2xl font-black text-amber-500">烟雨楼</h2>
                        <div class="flex items-center gap-3 mt-2 text-xl font-bold">
                            <span class="text-amber-400"><i class="fa-solid fa-star"></i> <span id="my-stars">0</span></span>
                            <span class="text-slate-400 text-sm"><i class="fa-solid fa-fire text-orange-500"></i> <span id="my-dest">0.00%</span></span>
                        </div>
                    </div>
                    <div class="w-[20%] text-center flex flex-col items-center">
                        <span class="text-xs text-slate-400 mb-1">剩余进攻机会</span>
                        <div class="w-16 h-16 rounded-full border-4 border-slate-700 flex items-center justify-center text-xl font-black text-white" id="attacks-left">0</div>
                    </div>
                    <div class="w-[40%] text-right">
                        <h2 id="opp-clan-name" class="text-2xl font-black text-red-500">正在匹配...</h2>
                        <div class="flex justify-end items-center gap-3 mt-2 text-xl font-bold">
                            <span class="text-slate-400 text-sm"><span id="opp-dest">0.00%</span> <i class="fa-solid fa-fire text-orange-500"></i></span>
                            <span class="text-red-400"><span id="opp-stars">0</span> <i class="fa-solid fa-star"></i></span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-700 rounded-xl p-6 shadow-2xl">
                <h3 class="text-lg font-bold text-white mb-4 border-b border-slate-700 pb-2"><i class="fa-solid fa-list-check text-cyan-400"></i> 成员出战明细（按排序规则：漏刀优先 -> 战位顺序）</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-sm whitespace-nowrap">
                        <thead>
                            <tr class="text-slate-400 border-b border-slate-800">
                                <th class="pb-2 pl-2">#</th>
                                <th class="pb-2">成员名单</th>
                                <th class="pb-2 text-center">状态</th>
                                <th class="pb-2 text-center">战绩 (打出的星星)</th>
                                <th class="pb-2 text-center">摧毁率贡献</th>
                            </tr>
                        </thead>
                        <tbody id="members-list" class="divide-y divide-slate-800/50">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 转换 Supercell 特殊的时间格式 (20240528T153000.000Z)
        function parseCocTime(cocTime) {
            if (!cocTime) return new Date();
            const year = cocTime.slice(0, 4), month = cocTime.slice(4, 6), day = cocTime.slice(6, 8);
            const hour = cocTime.slice(9, 11), min = cocTime.slice(11, 13), sec = cocTime.slice(13, 15);
            return new Date(`${year}-${month}-${day}T${hour}:${min}:${sec}Z`);
        }

        async function loadWarData(clanPrefix) {
            // 切换按钮样式
            document.getElementById('btn-hq').className = clanPrefix === 'hq' ? 'px-6 py-2 rounded font-bold transition-colors bg-amber-600 text-white shadow-lg' : 'px-6 py-2 rounded font-bold transition-colors text-slate-400 hover:text-white';
            document.getElementById('btn-br').className = clanPrefix === 'br' ? 'px-6 py-2 rounded font-bold transition-colors bg-cyan-700 text-white shadow-lg' : 'px-6 py-2 rounded font-bold transition-colors text-slate-400 hover:text-white';
            
            document.getElementById('loading-box').classList.remove('hidden');
            document.getElementById('war-dashboard').classList.add('hidden');
            document.getElementById('error-box').classList.add('hidden');

            try {
                // 👉 呼叫我们自己的 Vercel 后端接口！
                const res = await fetch(`/api/war?tag=${clanPrefix}`);
                const data = await res.json();

                if (data.state === 'notInWar') throw new Error("部落目前不在战争期或日志未公开");
                if (data.error) throw new Error(data.error);

                renderDashboard(data);
                
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('war-dashboard').classList.remove('hidden');

            } catch (err) {
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('error-box').classList.remove('hidden');
                document.getElementById('error-msg').innerText = err.message;
            }
        }

        function renderDashboard(data) {
            // 1. 渲染概览
            document.getElementById('my-clan-name').innerText = data.clan.name;
            document.getElementById('my-stars').innerText = data.clan.stars || 0;
            document.getElementById('my-dest').innerText = (data.clan.destructionPercentage || 0).toFixed(2) + '%';
            
            document.getElementById('opp-clan-name').innerText = data.opponent.name || "正在匹配...";
            document.getElementById('opp-stars').innerText = data.opponent.stars || 0;
            document.getElementById('opp-dest').innerText = (data.opponent.destructionPercentage || 0).toFixed(2) + '%';

            // 状态与倒计时
            const stateText = data.state === 'preparation' ? '准备日' : (data.state === 'inWar' ? '战斗日 (进行中)' : '战争已结束');
            const endTime = parseCocTime(data.endTime);
            document.getElementById('war-status-time').innerHTML = `<i class="fa-solid fa-clock"></i> ${stateText} | 结束时间: ${endTime.toLocaleString()}`;

            // 计算剩余刀数 (普通部落战每人2刀，联赛1刀)
            const attacksPerMember = data.attacksPerMember || 2; 
            const totalAttacksPossible = data.teamSize * attacksPerMember;
            const attacksUsed = data.clan.attacks || 0;
            const attacksLeft = totalAttacksPossible - attacksUsed;
            const leftEl = document.getElementById('attacks-left');
            leftEl.innerText = attacksLeft;
            leftEl.className = `w-16 h-16 rounded-full border-4 flex items-center justify-center text-xl font-black text-white ${attacksLeft > 0 ? 'border-cyan-500 text-cyan-400' : 'border-slate-700 text-slate-500'}`;

            // 2. 渲染出战名单
            const maxA = data.attacksPerMember || 2;
            let members = data.clan.members || [];
            
            // 智能排序：有漏刀（未打满）的排在最上面！然后按战位（几号）排
            members.sort((a, b) => {
                const aUsed = a.attacks ? a.attacks.length : 0;
                const bUsed = b.attacks ? b.attacks.length : 0;
                const aMissed = maxA - aUsed;
                const bMissed = maxA - bUsed;
                if (aMissed !== bMissed) return bMissed - aMissed; // 漏得多的排前面
                return a.mapPosition - b.mapPosition; // 战位靠前的排前面
            });

            document.getElementById('members-list').innerHTML = members.map(m => {
                const used = m.attacks ? m.attacks.length : 0;
                const missed = maxA - used;
                let statusBadge = '';
                let trClass = 'hover:bg-slate-800/50 transition-colors';
                
                if (missed === 0) {
                    statusBadge = `<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/50 px-2 py-0.5 rounded text-xs"><i class="fa-solid fa-check"></i> 任务完成</span>`;
                } else if (used > 0 && missed > 0) {
                    statusBadge = `<span class="bg-amber-500/20 text-amber-400 border border-amber-500/50 px-2 py-0.5 rounded text-xs"><i class="fa-solid fa-hourglass-half"></i> 剩 ${missed} 刀</span>`;
                } else {
                    statusBadge = `<span class="bg-red-500/20 text-red-400 border border-red-500/50 px-2 py-0.5 rounded text-xs font-bold animate-pulse"><i class="fa-solid fa-skull"></i> 尚未进攻 (剩 ${missed} 刀)</span>`;
                    trClass = 'bg-red-950/20 hover:bg-red-900/30'; // 没打的整行泛红警示
                }

                // 统计该成员贡献的星星和摧毁率
                let stars = 0; let dest = 0;
                if (m.attacks) {
                    m.attacks.forEach(atk => { stars += atk.stars; dest += atk.destructionPercentage; });
                }

                return `
                <tr class="${trClass}">
                    <td class="py-3 pl-2 font-mono text-slate-500 text-xs">${m.mapPosition}</td>
                    <td class="py-3 font-bold text-slate-200">${m.name}</td>
                    <td class="py-3 text-center">${statusBadge}</td>
                    <td class="py-3 text-center text-amber-400 font-bold">${stars > 0 ? stars + ' <i class="fa-solid fa-star text-xs"></i>' : '-'}</td>
                    <td class="py-3 text-center text-orange-400 font-bold">${dest > 0 ? dest + '%' : '-'}</td>
                </tr>
                `;
            }).join('');
        }

        // 页面加载默认呼叫总部
        window.onload = () => loadWarData('hq');
    </script>
</body>
</html>
