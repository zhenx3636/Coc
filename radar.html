<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>烟雨楼 & 星辰璀璨 | 高密度全景雷达</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #020617; color: white; font-family: 'PingFang SC', sans-serif; }
        .radar-scan { background: radial-gradient(circle at 50% 0%, rgba(6,182,212,0.1) 0%, rgba(2,6,23,1) 80%); }
        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        /* 极致紧凑的表格样式 */
        .dense-table th, .dense-table td { padding: 4px 6px; font-size: 11px; white-space: nowrap; }
        .row-missed { background-color: rgba(127, 29, 29, 0.2); }
        .row-done { background-color: rgba(15, 23, 42, 0.5); }
    </style>
</head>
<body class="selection:bg-cyan-500/30 min-h-screen p-2 radar-scan">
    <div class="max-w-6xl mx-auto space-y-3">
        
        <div class="flex justify-between items-center bg-slate-900 border border-slate-700 p-2 rounded-lg shadow-xl">
            <h1 class="text-sm md:text-lg font-black tracking-widest flex items-center gap-2 text-cyan-400">
                <i class="fa-solid fa-satellite-dish animate-pulse"></i> 战争实况总览
            </h1>
            <div class="flex gap-1 bg-slate-800 p-1 rounded-md border border-slate-700">
                <button onclick="loadWarData('hq')" id="btn-hq" class="px-3 py-1 rounded text-[10px] font-bold bg-amber-600 text-white shadow-lg">烟雨楼</button>
                <button onclick="loadWarData('br')" id="btn-br" class="px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white">星辰璀璨</button>
            </div>
        </div>

        <div id="loading-box" class="text-center py-10 text-cyan-400 text-sm"><i class="fa-solid fa-spinner animate-spin text-xl mb-2"></i><p>接收卫星信号中...</p></div>
        <div id="error-box" class="hidden text-center py-10 text-red-500 font-bold bg-red-950/20 rounded-lg border border-red-500/30 p-4"><p id="error-msg" class="text-xs"></p></div>

        <div id="war-dashboard" class="hidden space-y-3">
            
            <div class="bg-slate-900 border border-slate-700 rounded-lg p-2 shadow-xl flex justify-between items-center relative overflow-hidden">
                <div class="absolute inset-0 opacity-5 flex justify-center items-center font-black text-6xl italic z-0">VS</div>
                <div class="w-[35%] text-left relative z-10">
                    <h2 id="my-clan-name" class="text-sm font-black text-amber-500 truncate">烟雨楼</h2>
                    <div class="flex items-baseline gap-1 mt-0.5">
                        <span class="text-xl font-black text-white" id="my-stars">0</span>
                        <span class="text-[9px] text-slate-400"><i class="fa-solid fa-star text-amber-400"></i> | <span id="my-dest">0%</span></span>
                    </div>
                </div>
                <div class="w-[30%] text-center relative z-10 flex flex-col items-center">
                    <div class="text-[9px] text-cyan-400 font-mono tracking-widest mb-1" id="war-status-time"></div>
                    <div class="bg-slate-950 border border-slate-700 px-3 py-0.5 rounded-full flex items-center gap-1.5 shadow-inner">
                        <span class="text-[9px] text-slate-500">剩余</span>
                        <span class="font-black text-sm text-cyan-400" id="attacks-left">0</span>
                        <span class="text-[9px] text-slate-500">刀</span>
                    </div>
                </div>
                <div class="w-[35%] text-right relative z-10">
                    <h2 id="opp-clan-name" class="text-sm font-black text-slate-300 truncate">匹配中...</h2>
                    <div class="flex items-baseline gap-1 mt-0.5 justify-end">
                        <span class="text-[9px] text-slate-400"><span id="opp-dest">0%</span> | <i class="fa-solid fa-star text-slate-500"></i></span>
                        <span class="text-xl font-black text-white" id="opp-stars">0</span>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 border border-slate-700 rounded-lg shadow-xl overflow-hidden">
                <div class="bg-slate-800 border-b border-slate-700 px-2 py-1.5 flex justify-between items-center">
                    <span class="text-[10px] font-bold text-slate-300"><i class="fa-solid fa-table-cells text-cyan-400"></i> 战地全景图</span>
                    <span class="text-[9px] text-red-400 animate-pulse"><i class="fa-solid fa-skull"></i> 红色标记为未打满成员</span>
                </div>
                
                <div class="overflow-x-auto no-scrollbar">
                    <table class="w-full text-left dense-table">
                        <thead class="bg-slate-950 text-slate-500 border-b border-slate-800">
                            <tr>
                                <th class="text-center font-mono w-6">#</th>
                                <th>参战指挥官</th>
                                <th id="th-atk-1">攻击 1</th>
                                <th id="th-atk-2" class="hidden">攻击 2</th>
                                <th class="text-right text-amber-500 border-l border-slate-800 pl-2">贡献</th>
                            </tr>
                        </thead>
                        <tbody id="members-list" class="divide-y divide-slate-800/60">
                            </tbody>
                    </table>
                </div>
                <div class="text-[9px] text-center text-slate-600 py-1 bg-slate-950 border-t border-slate-800">💡 提示：手机横屏观看效果达到巅峰</div>
            </div>
        </div>
    </div>

    <script>
        function parseCocTime(cocTime) {
            if (!cocTime) return new Date();
            const year = cocTime.slice(0, 4), month = cocTime.slice(4, 6), day = cocTime.slice(6, 8);
            const hour = cocTime.slice(9, 11), min = cocTime.slice(11, 13), sec = cocTime.slice(13, 15);
            return new Date(`${year}-${month}-${day}T${hour}:${min}:${sec}Z`);
        }

        async function loadWarData(clanPrefix) {
            document.getElementById('btn-hq').className = clanPrefix === 'hq' ? 'px-3 py-1 rounded text-[10px] font-bold bg-amber-600 text-white shadow-lg' : 'px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white';
            document.getElementById('btn-br').className = clanPrefix === 'br' ? 'px-3 py-1 rounded text-[10px] font-bold bg-cyan-700 text-white shadow-lg' : 'px-3 py-1 rounded text-[10px] font-bold text-slate-400 hover:text-white';
            
            document.getElementById('loading-box').classList.remove('hidden');
            document.getElementById('war-dashboard').classList.add('hidden');
            document.getElementById('error-box').classList.add('hidden');

            try {
                const res = await fetch(`/api/war?tag=${clanPrefix}`);
                const data = await res.json();

                if (data.reason === 'accessDenied') throw new Error("⚠️ 官方拦截：部落战日志未公开！<br>请去游戏设置内公开，并等待10分钟。");
                if (data.state === 'notInWar') throw new Error("💤 当前不在战争期或匹配中。");
                if (data.error) throw new Error(data.error);
                if (!data.clan || !data.clan.name) throw new Error("未能获取官方完整数据。");

                renderDashboard(data);
                
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('war-dashboard').classList.remove('hidden');
            } catch (err) {
                document.getElementById('loading-box').classList.add('hidden');
                document.getElementById('error-box').classList.remove('hidden');
                document.getElementById('error-msg').innerHTML = err.message;
            }
        }

        // 渲染单次攻击的微缩 HTML
        function renderAttackCell(atk) {
            if (!atk) return `<span class="text-slate-700 font-mono">-</span>`;
            const starColor = atk.stars === 3 ? 'text-amber-400 font-black' : (atk.stars > 0 ? 'text-slate-200 font-bold' : 'text-slate-500');
            return `
                <div class="flex items-center gap-1.5">
                    <span class="w-8 ${starColor}">${atk.stars}<i class="fa-solid fa-star text-[8px] ml-0.5"></i></span>
                    <span class="w-8 text-[9px] ${atk.destructionPercentage === 100 ? 'text-amber-500/80' : 'text-red-400/80'}">${atk.destructionPercentage}%</span>
                    <span class="text-[9px] text-slate-500">打</span>
                    <span class="bg-slate-800 text-cyan-400 font-mono text-[9px] px-1 rounded shadow-inner border border-slate-700">#${atk.opponentMapPosition}</span>
                </div>
            `;
        }

        function renderDashboard(data) {
            // 概览
            document.getElementById('my-clan-name').innerText = data.clan.name;
            document.getElementById('my-stars').innerText = data.clan.stars || 0;
            document.getElementById('my-dest').innerText = (data.clan.destructionPercentage || 0).toFixed(1) + '%';
            
            document.getElementById('opp-clan-name').innerText = data.opponent.name || "匹配中...";
            document.getElementById('opp-stars').innerText = data.opponent.stars || 0;
            document.getElementById('opp-dest').innerText = (data.opponent.destructionPercentage || 0).toFixed(1) + '%';

            // 时间
            const endTime = parseCocTime(data.endTime);
            const now = new Date();
            let stateText = data.state === 'preparation' ? '准备日' : (data.state === 'inWar' ? '战斗日' : '已结束');
            document.getElementById('war-status-time').innerText = `${stateText}`;

            // 剩余刀数判定 (处理联赛1刀 vs 普通战2刀)
            const attacksPerMember = data.attacksPerMember || 2; 
            const totalAttacksPossible = data.teamSize * attacksPerMember;
            document.getElementById('attacks-left').innerText = totalAttacksPossible - (data.clan.attacks || 0);

            // 动态显示攻击列
            if (attacksPerMember === 2) {
                document.getElementById('th-atk-2').classList.remove('hidden');
            } else {
                document.getElementById('th-atk-2').classList.add('hidden');
            }

            // 成员数据排序：漏刀的强制顶在最上面，然后按战位排
            let members = data.clan.members || [];
            members.sort((a, b) => {
                const aMissed = attacksPerMember - (a.attacks ? a.attacks.length : 0);
                const bMissed = attacksPerMember - (b.attacks ? b.attacks.length : 0);
                if (aMissed !== bMissed) return bMissed - aMissed; 
                return a.mapPosition - b.mapPosition; 
            });

            // 渲染高密度行
            document.getElementById('members-list').innerHTML = members.map(m => {
                const used = m.attacks ? m.attacks.length : 0;
                const missed = attacksPerMember - used;
                let trClass = missed > 0 ? 'row-missed' : 'row-done hover:bg-slate-800';
                
                let totalS = 0; let totalD = 0;
                if (m.attacks) m.attacks.forEach(atk => { totalS += atk.stars; totalD += atk.destructionPercentage; });

                let atk1Html = renderAttackCell(m.attacks ? m.attacks[0] : null);
                let atk2Html = attacksPerMember === 2 ? `<td>${renderAttackCell(m.attacks ? m.attacks[1] : null)}</td>` : '';
                
                // 如果漏刀，显示红色待命警告
                if (!m.attacks || !m.attacks[0]) atk1Html = `<span class="text-red-400/80 text-[9px] font-bold border border-red-500/30 px-1 rounded bg-red-950/50">挂机中</span>`;
                if (attacksPerMember === 2 && used === 1) atk2Html = `<td><span class="text-amber-400/80 text-[9px] font-bold border border-amber-500/30 px-1 rounded bg-amber-950/50">余 1 刀</span></td>`;

                return `
                <tr class="${trClass} transition-colors">
                    <td class="text-center font-mono text-slate-500 border-r border-slate-800/50">${m.mapPosition}</td>
                    <td class="font-bold text-slate-200">
                        <div class="flex items-center gap-1">
                            <span class="text-[8px] text-slate-600 italic">Lv.${m.townhallLevel}</span>
                            <span class="truncate max-w-[80px] sm:max-w-[120px]">${m.name}</span>
                        </div>
                    </td>
                    <td>${atk1Html}</td>
                    ${atk2Html}
                    <td class="text-right border-l border-slate-800/50 pl-2">
                        <div class="flex justify-end gap-1.5 items-center">
                            <span class="text-amber-400 font-bold">${totalS > 0 ? totalS : '-'}<i class="fa-solid fa-star text-[7px] ml-0.5"></i></span>
                            <span class="text-red-400 text-[10px] w-8 text-right">${totalD > 0 ? totalD+'%' : '-'}</span>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');
        }

        window.onload = () => loadWarData('hq');
    </script>
</body>
</html>
